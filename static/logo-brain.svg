<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="Moniemind — brain concept">
  <defs>
    <linearGradient id="mm-brain-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#0E7A37"/>
    </linearGradient>
  </defs>
  <!-- Brain silhouette with Naira symbol inside, suggests "money mind" -->
  <g transform="translate(25, 25)">
    <!-- Brain outer shape — two hemispheres -->
    <path d="M 18 50 Q 8 30, 22 18 Q 35 8, 50 14 Q 65 8, 78 18 Q 92 30, 82 50 Q 92 70, 78 82 Q 65 92, 50 86 Q 35 92, 22 82 Q 8 70, 18 50 Z"
          fill="url(#mm-brain-grad)"/>
    <!-- Brain center division -->
    <path d="M 50 14 Q 48 50, 50 86" stroke="#0A1F44" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Brain folds (left hemisphere) -->
    <path d="M 22 30 Q 32 38, 28 50 Q 32 62, 24 70" stroke="#0A1F44" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Brain folds (right hemisphere) -->
    <path d="M 78 30 Q 68 38, 72 50 Q 68 62, 76 70" stroke="#0A1F44" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Naira symbol centered -->
    <text x="50" y="60" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
          font-weight="900" font-size="38" fill="#FFFFFF">₦</text>
    <!-- Tiny coin/spark accent -->
    <circle cx="92" cy="20" r="6" fill="#16A34A" stroke="#0A1F44" stroke-width="1.5"/>
    <text x="92" y="24" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
          font-weight="700" font-size="8" fill="#0A1F44">₦</text>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="145" y="95" font-size="50" font-weight="800" fill="#0A1F44">Monie</text>
    <text x="303" y="95" font-size="50" font-weight="800" fill="url(#mm-brain-grad)">mind</text>
  </g>
</svg>
